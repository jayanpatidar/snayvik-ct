spring:
  application:
    name: snayvik-ct
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/snayvik_kpi}
    username: ${SPRING_DATASOURCE_USERNAME:snayvik}
    password: ${SPRING_DATASOURCE_PASSWORD:snayvik}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 5s
      repositories:
        enabled: false

app:
  ingestion:
    queue-name: kpi:recalc:jobs
    worker-delay-ms: 3000
  integrations:
    github:
      webhook-secret: ${GITHUB_WEBHOOK_SECRET:change-me}
    monday:
      webhook-token: ${MONDAY_WEBHOOK_TOKEN:change-me}
  security:
    user:
      username: ${APP_USER_USERNAME:kpi-user}
      password: ${APP_USER_PASSWORD:change-me-user}
    admin:
      username: ${APP_ADMIN_USERNAME:kpi-admin}
      password: ${APP_ADMIN_PASSWORD:change-me-admin}
  task-key-regex: '([A-Z]{2,10}-[a-zA-Z0-9]+)'
  snapshots:
    cron: "0 5 0 * * *"
  thresholds:
    cron: "0 */10 * * * *"
  time-governance:
    cron: "0 */15 * * * *"
  retention:
    cron: "0 20 1 * * *"
    webhook-days: 90
    threshold-marker-days: 120
  health:
    queue-backlog-critical: 1000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
