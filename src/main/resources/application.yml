spring:
  application:
    name: snayvik-ct
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/snayvik_kpi}
    username: ${SPRING_DATASOURCE_USERNAME:snayvik}
    password: ${SPRING_DATASOURCE_PASSWORD:snayvik}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 5s
      repositories:
        enabled: false

app:
  ingestion:
    queue-name: kpi:recalc:jobs
    worker-delay-ms: 3000
  integrations:
    github:
      webhook-secret: ${GITHUB_WEBHOOK_SECRET:change-me}
    monday:
      webhook-token: ${MONDAY_WEBHOOK_TOKEN:change-me}
    oauth:
      github:
        enabled: ${APP_INTEGRATIONS_OAUTH_GITHUB_ENABLED:false}
        client-id: ${APP_INTEGRATIONS_OAUTH_GITHUB_CLIENT_ID:}
        client-secret: ${APP_INTEGRATIONS_OAUTH_GITHUB_CLIENT_SECRET:}
        authorization-uri: ${APP_INTEGRATIONS_OAUTH_GITHUB_AUTH_URI:https://github.com/login/oauth/authorize}
        token-uri: ${APP_INTEGRATIONS_OAUTH_GITHUB_TOKEN_URI:https://github.com/login/oauth/access_token}
        scopes: ${APP_INTEGRATIONS_OAUTH_GITHUB_SCOPES:repo,read:org}
        redirect-uri: ${APP_INTEGRATIONS_OAUTH_GITHUB_REDIRECT_URI:}
      monday:
        enabled: ${APP_INTEGRATIONS_OAUTH_MONDAY_ENABLED:false}
        client-id: ${APP_INTEGRATIONS_OAUTH_MONDAY_CLIENT_ID:}
        client-secret: ${APP_INTEGRATIONS_OAUTH_MONDAY_CLIENT_SECRET:}
        authorization-uri: ${APP_INTEGRATIONS_OAUTH_MONDAY_AUTH_URI:https://auth.monday.com/oauth2/authorize}
        token-uri: ${APP_INTEGRATIONS_OAUTH_MONDAY_TOKEN_URI:https://auth.monday.com/oauth2/token}
        scopes: ${APP_INTEGRATIONS_OAUTH_MONDAY_SCOPES:}
        redirect-uri: ${APP_INTEGRATIONS_OAUTH_MONDAY_REDIRECT_URI:}
      slack:
        enabled: ${APP_INTEGRATIONS_OAUTH_SLACK_ENABLED:false}
        client-id: ${APP_INTEGRATIONS_OAUTH_SLACK_CLIENT_ID:}
        client-secret: ${APP_INTEGRATIONS_OAUTH_SLACK_CLIENT_SECRET:}
        authorization-uri: ${APP_INTEGRATIONS_OAUTH_SLACK_AUTH_URI:https://slack.com/oauth/v2/authorize}
        token-uri: ${APP_INTEGRATIONS_OAUTH_SLACK_TOKEN_URI:https://slack.com/api/oauth.v2.access}
        scopes: ${APP_INTEGRATIONS_OAUTH_SLACK_SCOPES:}
        redirect-uri: ${APP_INTEGRATIONS_OAUTH_SLACK_REDIRECT_URI:}
  task-key-regex: '([A-Z]{2,10}-[a-zA-Z0-9]+)'
  snapshots:
    cron: "0 5 0 * * *"
  thresholds:
    cron: "0 */10 * * * *"
  time-governance:
    cron: "0 */15 * * * *"
  retention:
    cron: "0 20 1 * * *"
    webhook-days: 90
    threshold-marker-days: 120
  sync:
    enabled: ${APP_SYNC_ENABLED:false}
    initial-run-on-startup: ${APP_SYNC_INITIAL_RUN_ON_STARTUP:false}
    reconciliation-cron: ${APP_SYNC_RECONCILIATION_CRON:0 30 2 * * *}
    github-lookback-days: ${APP_SYNC_GITHUB_LOOKBACK_DAYS:90}
    github-repositories: ${APP_SYNC_GITHUB_REPOSITORIES:}
  health:
    queue-backlog-critical: 1000
  security:
    integration-encryption-key: ${APP_INTEGRATION_ENCRYPTION_KEY:U25heXZpa0RlZmF1bHRJbnRlZ3JhdGlvbktleTEyMzQ1Njc4OTA=}
  seed:
    enabled: ${APP_SEED_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
