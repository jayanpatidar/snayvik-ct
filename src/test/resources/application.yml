spring:
  datasource:
    url: jdbc:h2:mem:snayvik_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none

app:
  integrations:
    github:
      webhook-secret: test-github-secret
    monday:
      webhook-token: test-monday-token
  task-key-regex: '([A-Z]{2,10}-[a-zA-Z0-9]+)'
