services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8086:8086"
    environment:
      SERVER_PORT: 8086
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/snayvik_kpi
      SPRING_DATASOURCE_USERNAME: snayvik
      SPRING_DATASOURCE_PASSWORD: snayvik
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_INTEGRATIONS_OAUTH_GITHUB_ENABLED: ${APP_INTEGRATIONS_OAUTH_GITHUB_ENABLED:-false}
      APP_INTEGRATIONS_OAUTH_GITHUB_CLIENT_ID: ${APP_INTEGRATIONS_OAUTH_GITHUB_CLIENT_ID:-}
      APP_INTEGRATIONS_OAUTH_GITHUB_CLIENT_SECRET: ${APP_INTEGRATIONS_OAUTH_GITHUB_CLIENT_SECRET:-}
      APP_INTEGRATIONS_OAUTH_GITHUB_REDIRECT_URI: ${APP_INTEGRATIONS_OAUTH_GITHUB_REDIRECT_URI:-}
      APP_INTEGRATIONS_OAUTH_MONDAY_ENABLED: ${APP_INTEGRATIONS_OAUTH_MONDAY_ENABLED:-false}
      APP_INTEGRATIONS_OAUTH_MONDAY_CLIENT_ID: ${APP_INTEGRATIONS_OAUTH_MONDAY_CLIENT_ID:-}
      APP_INTEGRATIONS_OAUTH_MONDAY_CLIENT_SECRET: ${APP_INTEGRATIONS_OAUTH_MONDAY_CLIENT_SECRET:-}
      APP_INTEGRATIONS_OAUTH_MONDAY_REDIRECT_URI: ${APP_INTEGRATIONS_OAUTH_MONDAY_REDIRECT_URI:-}
      APP_INTEGRATIONS_OAUTH_SLACK_ENABLED: ${APP_INTEGRATIONS_OAUTH_SLACK_ENABLED:-false}
      APP_INTEGRATIONS_OAUTH_SLACK_CLIENT_ID: ${APP_INTEGRATIONS_OAUTH_SLACK_CLIENT_ID:-}
      APP_INTEGRATIONS_OAUTH_SLACK_CLIENT_SECRET: ${APP_INTEGRATIONS_OAUTH_SLACK_CLIENT_SECRET:-}
      APP_INTEGRATIONS_OAUTH_SLACK_REDIRECT_URI: ${APP_INTEGRATIONS_OAUTH_SLACK_REDIRECT_URI:-}
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: snayvik_kpi
      POSTGRES_USER: snayvik
      POSTGRES_PASSWORD: snayvik
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  redis_data:
